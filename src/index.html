<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jump Rope!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="env-bar">
      <span>ENV:</span>
      <button class="env-btn active" data-env="park">Park</button>
      <button class="env-btn" data-env="playground">Playground</button>
      <button class="env-btn" data-env="moon">Moon</button>
    </div>
    <div id="canvas-container">
      <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>
    <div id="hint">SPACE or TAP to jump</div>
  </div>
  <script src="game.js"></script>
</body>
</html>
